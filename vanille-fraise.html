<html lang="ru">
<head>

  <style>
    :root {
      --bg: #f3f2ee;
      --text: #223128;
      --muted: #6f7d73;
      --line: #e4e6df;
      --green-soft: #4b7d61;
      --green-soft-2: #dfe9dd;
      --chip: #edf1ea;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: "Manrope", sans-serif; background: var(--bg); color: var(--text); }
    img { display: block; max-width: 100%; }
    .container { width: min(900px, calc(100% - 36px)); margin: 0 auto; }

    /* STICKY HEADER */
    .topbar {
      position: sticky; top: 0; z-index: 100;
      background: linear-gradient(135deg, #123726 0%, #21513a 52%, #44795b 100%);
      box-shadow: 0 4px 20px rgba(18,34,24,0.18);
    }
    .topbar-inner {
      display: flex; justify-content: space-between;
      align-items: center; gap: 24px; height: 70px;
    }
    .brand-title { margin: 0; color: #fff; font-size: clamp(18px,2vw,28px); font-weight: 800; letter-spacing: -0.04em; text-decoration: none; }
    .contact { display: flex; align-items: center; gap: 14px; }
    .contact-phone { font-size: clamp(16px,1.6vw,22px); font-weight: 800; color: #fff; text-decoration: none; letter-spacing: -0.03em; white-space: nowrap; }
    .insta-btn { display: inline-flex; align-items: center; gap: 7px; background: rgba(255,255,255,0.14); padding: 6px 12px 6px 6px; border-radius: 999px; text-decoration: none; color: #fff; font-weight: 700; font-size: 13px; border: 1px solid rgba(255,255,255,0.12); }
    .insta-avatar { width: 28px; height: 28px; border-radius: 50%; object-fit: cover; background: rgba(255,255,255,0.2); }

    /* BACK */
    .back-wrap { padding: 20px 0 0; }
    .back-link { display: inline-flex; align-items: center; gap: 6px; color: var(--muted); font-size: 14px; font-weight: 600; text-decoration: none; }
    .back-link:hover { color: var(--green-soft); }

    /* HERO SECTION */
    .sort-hero { padding: 20px 0 0; }
    .sort-hero-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 28px; align-items: start; }

    /* GALLERY */
    .gallery { display: flex; flex-direction: column; gap: 10px; }
    .gallery-main { border-radius: 22px; overflow: hidden; aspect-ratio: 4/3.6; background: #dfe9dd; }
    .gallery-main img { width: 100%; height: 100%; object-fit: cover; }
    .gallery-thumbs { display: flex; gap: 8px; }
    .gallery-thumb { flex: 1; border-radius: 12px; overflow: hidden; aspect-ratio: 1; cursor: pointer; opacity: 0.7; transition: opacity 0.2s; }
    .gallery-thumb:hover, .gallery-thumb.active { opacity: 1; }
    .gallery-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .gallery-placeholder {
      width: 100%; height: 100%;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: linear-gradient(135deg, #e8f0e5, #d4e4d0);
      color: #8aab91; gap: 8px; font-size: 13px;
    }
    .gallery-placeholder svg { width: 40px; height: 40px; stroke: #8aab91; stroke-width: 1.2; fill: none; stroke-linecap: round; stroke-linejoin: round; }

    /* INFO PANEL */
    .info-panel { display: flex; flex-direction: column; gap: 0; }
    .sort-kicker { font-size: 12px; color: #7e8c82; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; }
    .sort-title { font-family: "DM Serif Display", serif; font-size: clamp(32px,4vw,52px); line-height: 1; font-weight: 400; color: #213127; letter-spacing: -0.02em; margin: 0 0 4px; }
    .sort-latin { font-size: 15px; color: #7e8c82; font-style: italic; margin-bottom: 20px; }

    /* Иконки-параметры */
    .params-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
    .param-card {
      background: #fff;
      border-radius: 16px;
      padding: 12px 14px;
      border: 1px solid var(--line);
    }
    .param-card__label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 6px; display: flex; align-items: center; gap: 6px; }
    .param-card__label svg { width: 14px; height: 14px; stroke: var(--muted); stroke-width: 1.8; fill: none; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }
    .param-card__value { font-size: 15px; font-weight: 700; color: var(--text); }
    .param-card__sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .param-card--primorye { grid-column: 1 / -1; background: #f0f7ed; border-color: #c8e0c4; }
    .param-card--risky { background: #fef3e8; border-color: #f5d5a8; }

    /* Цвета по сезону */
    .color-stages { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
    .color-stage { display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .color-dot { width: 32px; height: 32px; border-radius: 50%; border: 2px solid rgba(0,0,0,0.08); }
    .color-stage-label { font-size: 10px; color: var(--muted); text-align: center; max-width: 50px; }

    /* CTA */
    .cta-block { background: linear-gradient(135deg, #123726, #21513a); border-radius: 20px; padding: 20px; color: #fff; }
    .cta-block h4 { margin: 0 0 8px; font-size: 17px; font-weight: 800; }
    .cta-block p { margin: 0 0 14px; font-size: 14px; opacity: 0.8; line-height: 1.5; }
    .cta-phone { display: block; font-size: 22px; font-weight: 800; color: #fff; text-decoration: none; letter-spacing: -0.03em; margin-bottom: 10px; }
    .cta-insta { display: inline-flex; align-items: center; gap: 7px; background: rgba(255,255,255,0.15); padding: 8px 14px; border-radius: 999px; color: #fff; text-decoration: none; font-weight: 700; font-size: 13px; }

    /* DETAILS */
    .details-section { padding: 32px 0 48px; }
    .details-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .detail-block {
      background: #fff;
      border-radius: 20px;
      padding: 20px;
      border: 1px solid var(--line);
    }
    .detail-block--full { grid-column: 1 / -1; }
    .detail-block h3 { margin: 0 0 12px; font-size: 14px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); }
    .detail-block p { margin: 0; font-size: 15px; line-height: 1.65; color: var(--text); }
    .detail-block ul { margin: 0; padding: 0 0 0 18px; }
    .detail-block ul li { font-size: 15px; line-height: 1.7; color: var(--text); margin-bottom: 4px; }

    .bloom-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .bloom-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
    .bloom-text { font-size: 14px; }

    .tag-list { display: flex; flex-wrap: wrap; gap: 8px; }
    .tag { padding: 7px 13px; border-radius: 999px; background: var(--chip); color: #506055; font-size: 13px; font-weight: 600; }

    .name-meaning { font-style: italic; color: var(--muted); font-size: 15px; line-height: 1.6; }

    /* MOBILE */
    @media (max-width: 700px) {
      .sort-hero-grid { grid-template-columns: 1fr; }
      .details-grid { grid-template-columns: 1fr; }
      .detail-block--full { grid-column: 1; }
      .params-grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>

// ============================================================
//  ОПРЕДЕЛЯЕМ КАКОЙ СОРТ ОТКРЫТ
// ============================================================
function getSortId() {
  // Из имени файла: limelight.html → limelight
  const path = window.location.pathname;
  const file = path.split('/').pop().replace('.html', '');
  return file;
}

  const h = HYDRANGEAS[id];

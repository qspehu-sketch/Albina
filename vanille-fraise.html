  <style>
    :root {
      --bg: #f3f2ee;
      --text: #223128;
      --muted: #6f7d73;
      --line: #e4e6df;
      --green-soft: #4b7d61;
      --green-soft-2: #dfe9dd;
      --chip: #edf1ea;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: "Manrope", sans-serif; background: var(--bg); color: var(--text); }
    img { display: block; max-width: 100%; }
    .container { width: min(900px, calc(100% - 36px)); margin: 0 auto; }

    /* STICKY HEADER */
    .topbar {
      position: sticky; top: 0; z-index: 100;
      background: linear-gradient(135deg, #123726 0%, #21513a 52%, #44795b 100%);
      box-shadow: 0 4px 20px rgba(18,34,24,0.18);
    }
    .topbar-inner {
      display: flex; justify-content: space-between;
      align-items: center; gap: 24px; height: 70px;
    }
    .brand-title { margin: 0; color: #fff; font-size: clamp(18px,2vw,28px); font-weight: 800; letter-spacing: -0.04em; text-decoration: none; }
    .contact { display: flex; align-items: center; gap: 14px; }
    .contact-phone { font-size: clamp(16px,1.6vw,22px); font-weight: 800; color: #fff; text-decoration: none; letter-spacing: -0.03em; white-space: nowrap; }
    .insta-btn { display: inline-flex; align-items: center; gap: 7px; background: rgba(255,255,255,0.14); padding: 6px 12px 6px 6px; border-radius: 999px; text-decoration: none; color: #fff; font-weight: 700; font-size: 13px; border: 1px solid rgba(255,255,255,0.12); }
    .insta-avatar { width: 28px; height: 28px; border-radius: 50%; object-fit: cover; background: rgba(255,255,255,0.2); }

    /* BACK */
    .back-wrap { padding: 20px 0 0; }
    .back-link { display: inline-flex; align-items: center; gap: 6px; color: var(--muted); font-size: 14px; font-weight: 600; text-decoration: none; }
    .back-link:hover { color: var(--green-soft); }

    /* HERO SECTION */
    .sort-hero { padding: 20px 0 0; }
    .sort-hero-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 28px; align-items: start; }

    /* GALLERY */
    .gallery { display: flex; flex-direction: column; gap: 10px; }
    .gallery-main { border-radius: 22px; overflow: hidden; aspect-ratio: 4/3.6; background: #dfe9dd; }
    .gallery-main img { width: 100%; height: 100%; object-fit: cover; }
    .gallery-thumbs { display: flex; gap: 8px; }
    .gallery-thumb { flex: 1; border-radius: 12px; overflow: hidden; aspect-ratio: 1; cursor: pointer; opacity: 0.7; transition: opacity 0.2s; }
    .gallery-thumb:hover, .gallery-thumb.active { opacity: 1; }
    .gallery-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .gallery-placeholder {
      width: 100%; height: 100%;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: linear-gradient(135deg, #e8f0e5, #d4e4d0);
      color: #8aab91; gap: 8px; font-size: 13px;
    }
    .gallery-placeholder svg { width: 40px; height: 40px; stroke: #8aab91; stroke-width: 1.2; fill: none; stroke-linecap: round; stroke-linejoin: round; }

    /* INFO PANEL */
    .info-panel { display: flex; flex-direction: column; gap: 0; }
    .sort-kicker { font-size: 12px; color: #7e8c82; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; }
    .sort-title { font-family: "DM Serif Display", serif; font-size: clamp(32px,4vw,52px); line-height: 1; font-weight: 400; color: #213127; letter-spacing: -0.02em; margin: 0 0 4px; }
    .sort-latin { font-size: 15px; color: #7e8c82; font-style: normal; margin-bottom: 20px; }

    /* Иконки-параметры */
    .params-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
    .param-card {
      background: #fff;
      border-radius: 16px;
      padding: 12px 14px;
      border: 1px solid var(--line);
    }
    .param-card__label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 6px; display: flex; align-items: center; gap: 6px; }
    .param-card__label svg { width: 14px; height: 14px; stroke: var(--muted); stroke-width: 1.8; fill: none; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }
    .param-card__value { font-size: 15px; font-weight: 700; color: var(--text); }
    .param-card__sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .param-card--primorye { grid-column: 1 / -1; background: #f0f7ed; border-color: #c8e0c4; }
    .param-card--risky { background: #fef3e8; border-color: #f5d5a8; }

    /* Цвета по сезону */
    .color-stages { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
    .color-stage { display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .color-dot { width: 32px; height: 32px; border-radius: 50%; border: 2px solid rgba(0,0,0,0.08); }
    .color-stage-label { font-size: 10px; color: var(--muted); text-align: center; max-width: 50px; }

    /* CTA */
    .cta-block { background: linear-gradient(135deg, #123726, #21513a); border-radius: 20px; padding: 20px; color: #fff; }
    .cta-block h4 { margin: 0 0 8px; font-size: 17px; font-weight: 800; }
    .cta-block p { margin: 0 0 14px; font-size: 14px; opacity: 0.8; line-height: 1.5; }
    .cta-phone { display: block; font-size: 22px; font-weight: 800; color: #fff; text-decoration: none; letter-spacing: -0.03em; margin-bottom: 10px; }
    .cta-insta { display: inline-flex; align-items: center; gap: 7px; background: rgba(255,255,255,0.15); padding: 8px 14px; border-radius: 999px; color: #fff; text-decoration: none; font-weight: 700; font-size: 13px; }

    /* DETAILS */
    .details-section { padding: 32px 0 48px; }
    .details-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 22px; }
    .detail-block {
      background: #fff;
      border-radius: 20px;
      padding: 22px;
      border: 1px solid var(--line);
    }
    .detail-block--full { grid-column: 1 / -1; }
    .detail-block h3 { margin: 0 0 14px; font-size: 14px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); }
    .detail-block p { margin: 0; font-size: 15px; line-height: 1.65; color: var(--text); }
    .detail-block > .description-text { margin: 0; font-size: 15px; line-height: 1.65; color: var(--text); }
    .description-lead { display: block; font-size: 18px; font-weight: 600; color: #1a2e22; line-height: 1.55; margin-bottom: 10px; }
    .detail-block ul.features-list { list-style: none; padding: 0; margin: 0; }
    .detail-block ul.features-list li {
      position: relative;
      padding-left: 1.35em;
      margin-bottom: 8px;
      font-size: 15px;
      line-height: 1.7;
      color: var(--text);
    }
    .detail-block ul.features-list li::before {
      content: "✓";
      position: absolute;
      left: 0;
      color: #4b7d61;
      font-weight: 700;
    }

    .bloom-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .bloom-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
    .bloom-text { font-size: 14px; }

    .tag-list { display: flex; flex-wrap: wrap; gap: 8px; }
    .tag { padding: 7px 13px; border-radius: 999px; background: var(--chip); color: #506055; font-size: 13px; font-weight: 600; }

    .name-meaning { font-style: italic; color: var(--muted); font-size: 15px; line-height: 1.6; }

    /* MOBILE */
    @media (max-width: 700px) {
      .sort-hero-grid { grid-template-columns: 1fr; }
      .details-grid { grid-template-columns: 1fr; }
      .detail-block--full { grid-column: 1; }
      .params-grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>

}

// ============================================================
//  ОПРЕДЕЛЯЕМ КАКОЙ СОРТ ОТКРЫТ
// ============================================================
function getSortId() {
  // Из имени файла: limelight.html → limelight
  const path = window.location.pathname;
  const file = path.split('/').pop().replace('.html', '');
  return file;
}


// ============================================================
//  ТЕКСТ «О СОРТЕ»: первое предложение + остаток
// ============================================================
function escapeHtml(s) {
  return String(s)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

function splitFirstSentence(text) {
  const t = (text || "").trim();
  if (!t) return { lead: "", rest: "" };
  const m = t.match(/^(.+?[.!?])(\s+|$)(.*)$/s);
  if (m) return { lead: m[1].trim(), rest: m[3].trim() };
  return { lead: t, rest: "" };
}

function formatDescriptionHtml(text) {
  const { lead, rest } = splitFirstSentence(text);
  const leadH = escapeHtml(lead);
  const restH = rest ? " " + escapeHtml(rest) : "";
  return `<p class="description-text"><span class="description-lead">${leadH}</span>${restH}</p>`;
}

  const primCls = h.primorye === 'risky' ? 'param-card--risky' : '';

  const colorDotsHtml = h.colorStages.map(s => `
    <div class="color-stage">
      <div class="color-dot" style="background:${s.color}"></div>
      <div class="color-stage-label">${s.label}<br><span style="color:#223128;font-weight:600">${s.name}</span></div>
    </div>`).join('<div style="display:flex;align-items:center;color:#c0c8be;font-size:18px;margin-bottom:16px">→</div>');

  const descriptionHtml = formatDescriptionHtml(h.description);
  const featuresHtml = h.features.map(f => `<li>${escapeHtml(f)}</li>`).join('');
  const forWhomHtml = h.forWhom.map(t => `<span class="tag">${escapeHtml(t)}</span>`).join('');
  const headerRu = escapeHtml(sortHeader.ru);
  const headerEn = escapeHtml(sortHeader.en);

  // Фото
  const mainImg = `imageshydrangea/${h.images[0]}`;
  const thumbsHtml = h.images.map((img, i) => `
    <div class="gallery-thumb ${i===0?'active':''}" onclick="switchPhoto('imageshydrangea/${img}', this)">
      <img src="imageshydrangea/${img}" alt="${h.name}"
        onerror="this.parentElement.innerHTML='<div class=gallery-placeholder><svg viewBox=\\'0 0 24 24\\'><path d=\\'M12 3s-7 4.5-7 9.5a7 7 0 0 0 14 0C19 7.5 12 3 12 3z\\'/></svg></div>'">
    </div>`).join('');

  document.getElementById('page-content').innerHTML = `
    <div class="container back-wrap">
      <a href="index.html" class="back-link">← Все гортензии</a>
    </div>

    <section class="sort-hero">
      <div class="container">
        <div class="sort-hero-grid">

          <div class="gallery">
            <div class="gallery-main">
              <img id="main-photo" src="${mainImg}" alt="${h.name}"
                onerror="this.parentElement.innerHTML='<div class=gallery-placeholder style=height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px><svg viewBox=\\'0 0 24 24\\'style=\\'width:48px;height:48px;stroke:#8aab91;stroke-width:1.2;fill:none\\'><path d=\\'M12 3s-7 4.5-7 9.5a7 7 0 0 0 14 0C19 7.5 12 3 12 3z\\'/></svg><span style=color:#8aab91;font-size:13px>Фото скоро</span></div>'">
            </div>
            <div class="gallery-thumbs">${thumbsHtml}</div>
          </div>

          <div class="info-panel">
            <div class="sort-kicker">Гортензия ${h.typeRu.toLowerCase()}</div>
            <h1 class="sort-title">${headerRu}</h1>
            <div class="sort-latin">${headerEn}</div>

            <div class="params-grid">
              <div class="param-card">
                <div class="param-card__label">
                  <svg viewBox="0 0 24 24"><path d="M12 4v16M8.5 7.5 12 4l3.5 3.5M8.5 16.5 12 20l3.5-3.5"/></svg>
                  Размер
                </div>
                <div class="param-card__value">${h.heightCm[0]}–${h.heightCm[1]} см</div>
                <div class="param-card__sub">Ширина: ${h.widthCm ? h.widthCm[0]+'–'+h.widthCm[1]+' см' : 'схожая'}</div>
              </div>
              <div class="param-card">
                <div class="param-card__label">
                  <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3.6"/><path d="M12 2.5v2.7M12 18.8v2.7M21.5 12h-2.7M5.2 12H2.5M18.7 5.3l-1.9 1.9M18.7 18.7l-1.9-1.9M7.2 7.2 5.3 5.3M7.2 16.8l-1.9 1.9"/></svg>
                  Освещение
                </div>
                <div class="param-card__value">${h.light}</div>
              </div>
              <div class="param-card">
                <div class="param-card__label">
                  <svg viewBox="0 0 24 24"><path d="M12 2.5v19M12 6.5 8.8 4.8M12 6.5 15.2 4.8M12 17.5 8.8 19.2M12 17.5 15.2 19.2M4.5 8l15 8M19.5 8 4.5 16"/></svg>
                  Зимостойкость
                </div>
                <div class="param-card__value">${h.winterHardiness}</div>
              </div>
              <div class="param-card">
                <div class="param-card__label">
                  <svg viewBox="0 0 24 24"><path d="M12 3.5s-5.5 6.2-5.5 10a5.5 5.5 0 0 0 11 0c0-3.8-5.5-10-5.5-10z"/></svg>
                  Полив
                </div>
                <div class="param-card__value">${h.watering}</div>
              </div>
              <div class="param-card">
                <div class="param-card__label">
                  <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>
                  Цветение
                </div>
                <div class="param-card__value">${h.bloomPeriod}</div>
              </div>
              <div class="param-card">
                <div class="param-card__label">
                  <svg viewBox="0 0 24 24"><path d="M3 7h18M3 12h18M3 17h18"/></svg>
                  Почва
                </div>
                <div class="param-card__value" style="font-size:13px;font-weight:600">${h.soil}</div>
              </div>
              <div class="param-card param-card--primorye ${primCls}">
                <div class="param-card__label">Для Приморья</div>
                <div class="param-card__value" style="font-size:13px;font-weight:600">${h.primoryeNote}</div>
              </div>
            </div>

            <div class="cta-block">
              <h4>Хотите этот сорт?</h4>
              <p>Звоните или пишите — расскажем о наличии и посадке</p>
              <a href="tel:+79644462081" class="cta-phone">+7 964 446 20 81</a>
              <a href="https://instagram.com/primsad" class="cta-insta">@primsad в Instagram</a>
            </div>
          </div>
        </div>
      </div>
    </section>

    <section class="details-section">
      <div class="container">
        <div class="details-grid">

          <div class="detail-block detail-block--full">
            <h3>О сорте</h3>
            ${descriptionHtml}
          </div>

          <div class="detail-block detail-block--full">
            <h3>Смена цвета по сезону</h3>
            <div class="color-stages">${colorDotsHtml}</div>
          </div>

          <div class="detail-block">
            <h3>Ключевые особенности</h3>
            <ul class="features-list">${featuresHtml}</ul>
          </div>

          <div class="detail-block">
            <h3>Для кого подходит</h3>
            <div class="tag-list">${forWhomHtml}</div>
          </div>

          <div class="detail-block detail-block--full">
            <h3>Что означает название</h3>
            <p class="name-meaning">${h.nameMeaning}</p>
          </div>

        </div>
      </div>
    </section>
  `;
}

function switchPhoto(src, thumb) {
  document.getElementById('main-photo').src = src;
  document.querySelectorAll('.gallery-thumb').forEach(t => t.classList.remove('active'));
  thumb.classList.add('active');
}

renderPage();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Гортензии — Мои 12 соток</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Serif+Display&family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f3f2ee;
      --white: #ffffff;
      --text: #223128;
      --muted: #6f7d73;
      --line: #e4e6df;
      --green-dark: #173b2c;
      --green-mid: #2e5c45;
      --green-soft: #4b7d61;
      --green-soft-2: #dfe9dd;
      --chip: #edf1ea;
      --chip-text: #506055;
      --header-height: 70px;
      --bg-deep: #0e1a0e;
      --gold: #c8a96e;
      --gold-light: #ddc99a;
      --gold-muted: rgba(200, 169, 110, 0.25);
      --cream: #f5f0e8;
      --cream-dim: rgba(245, 240, 232, 0.5);
      --cream-faint: rgba(245, 240, 232, 0.1);
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: "Manrope", sans-serif; background: var(--bg); color: var(--text); }
    img { display: block; max-width: 100%; }
    .container { width: min(1320px, calc(100% - 36px)); margin: 0 auto; }

    /* ========================= HEADER ========================= */
    .header-shell {
      width: min(1320px, calc(100% - 36px));
      margin: 18px auto 0;
    }
    .site-header {
      width: 100%;
      position: sticky;
      top: 10px;
      z-index: 100;
      overflow: hidden;
      border-radius: 16px;
      background: linear-gradient(
        120deg,
        #071007 0%,
        #0d1b0d 14%,
        #153015 34%,
        #1f4720 52%,
        #173717 68%,
        #0d1e0d 84%,
        #061006 100%
      );
      box-shadow:
        0 6px 32px rgba(0,0,0,0.2),
        0 1px 4px rgba(0,0,0,0.12),
        inset 0 1px 0 rgba(255,255,255,0.03);
    }
    .header-bg {
      position: absolute;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
    }
    .header-bg::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 50% 160% at 5% 50%, rgba(60, 95, 55, 0.5), transparent 60%),
        radial-gradient(ellipse 40% 140% at 95% 40%, rgba(50, 80, 45, 0.35), transparent 55%),
        radial-gradient(ellipse 90% 60% at 50% 110%, rgba(15, 28, 15, 0.6), transparent 50%),
        radial-gradient(circle at 45% 30%, rgba(200, 169, 110, 0.04) 0%, transparent 45%);
    }
    .header-bg .leaf {
      position: absolute;
      opacity: 0.03;
      fill: var(--cream);
    }
    .leaf-1 { width: 320px; height: 320px; top: -90px; left: -50px; transform: rotate(-25deg); }
    .leaf-2 { width: 220px; height: 220px; top: -40px; right: 100px; transform: rotate(40deg); }
    .leaf-3 { width: 270px; height: 270px; bottom: -110px; right: -40px; transform: rotate(15deg); }
    .header-gold-line {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent 0%, var(--gold-muted) 15%, var(--gold) 50%, var(--gold-muted) 85%, transparent 100%);
    }
    .header-inner {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 22px 44px;
      gap: 24px;
    }
    .header-logo { flex-shrink: 0; }
    .logo-link {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
    }
    .logo-icon {
      width: 48px;
      height: 48px;
      flex-shrink: 0;
    }
    .logo-text {
      display: flex;
      flex-direction: column;
      line-height: 1;
    }
    .logo-top {
      font-family: "Cormorant Garamond", serif;
      font-weight: 600;
      font-size: 14px;
      color: var(--cream-dim);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .logo-main {
      font-family: "Cormorant Garamond", serif;
      font-weight: 600;
      font-size: 28px;
      color: var(--cream);
      letter-spacing: 0.02em;
      white-space: nowrap;
    }
    .logo-main em {
      font-style: italic;
      font-weight: 400;
      color: var(--gold-light);
    }
    .header-nav {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }
    .nav-divider-dot {
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: var(--cream-faint);
      flex-shrink: 0;
    }
    .nav-link {
      font-family: "Manrope", sans-serif;
      font-weight: 400;
      font-size: 13px;
      letter-spacing: 0.06em;
      text-transform: lowercase;
      color: var(--cream-dim);
      text-decoration: none;
      padding: 6px 14px;
      border-radius: 100px;
      transition: all 0.3s ease;
      white-space: nowrap;
      cursor: default;
    }
    .nav-link:hover {
      color: var(--cream-dim);
      background: transparent;
    }
    .header-contact {
      display: flex;
      align-items: center;
      gap: 20px;
      flex-shrink: 0;
    }
    .contact-info {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 2px;
    }
    .contact-name {
      font-family: "Cormorant Garamond", serif;
      font-weight: 400;
      font-style: italic;
      font-size: 14px;
      color: var(--gold-light);
      letter-spacing: 0.04em;
    }
    .contact-phone {
      font-family: "Manrope", sans-serif;
      font-weight: 500;
      font-size: 16px;
      color: var(--cream);
      letter-spacing: 0.05em;
      text-decoration: none;
      white-space: nowrap;
      transition: color 0.3s ease;
    }
    .contact-phone:hover { color: var(--gold-light); }
    .insta-link {
      display: flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      padding: 8px 16px;
      border-radius: 100px;
      border: 1px solid var(--cream-faint);
      transition: all 0.3s ease;
      flex-shrink: 0;
    }
    .insta-link:hover {
      border-color: var(--gold-muted);
      background: var(--cream-faint);
    }
    .insta-icon {
      width: 18px;
      height: 18px;
      color: var(--gold);
      flex-shrink: 0;
    }
    .insta-text {
      font-family: "Manrope", sans-serif;
      font-weight: 400;
      font-size: 13px;
      color: var(--cream-dim);
      letter-spacing: 0.02em;
      white-space: nowrap;
    }

    /* ========================= HERO ========================= */
    .hero-wrap { padding: 20px 0 18px; }
    .hero {
      width: 100%;
      background: rgba(255,255,255,0.84);
      border-radius: 30px;
      padding: 28px 28px 24px;
      box-shadow: 0 12px 34px rgba(31,38,33,0.05);
    }
    .hero-title {
      margin: 0 0 10px;
      font-family: "DM Serif Display", serif;
      font-size: clamp(44px,5vw,72px);
      line-height: 0.95;
      font-weight: 400;
      color: #213127;
      letter-spacing: -0.03em;
    }
    .hero-subtext { margin: 0 0 18px; font-size: 17px; color: var(--muted); }
    .search-row { display: grid; grid-template-columns: 1fr 170px; gap: 12px; margin-bottom: 14px; }
    .searchbox input {
      width: 100%; height: 62px; border-radius: 18px;
      border: 1px solid var(--line); background: #fff;
      padding: 0 18px; font-size: 18px;
      font-family: "Manrope", sans-serif; color: var(--text); outline: none;
    }
    .find-btn {
      border: none; border-radius: 18px;
      background: var(--green-soft); color: #fff;
      font-size: 18px; font-weight: 800;
      font-family: "Manrope", sans-serif; cursor: pointer;
    }
    .filters { display: flex; flex-wrap: wrap; gap: 10px; }
    .filter-chip {
      padding: 10px 16px; border-radius: 999px;
      background: var(--chip); color: var(--chip-text);
      font-size: 15px; border: 1px solid #e8ece6;
      cursor: pointer; font-family: "Manrope", sans-serif;
      transition: background 0.15s, color 0.15s;
    }
    .filter-chip.active { background: #4b7d61; color: #fff; border-color: #4b7d61; }

    /* ========================= GRID ========================= */
    .catalog-section { padding: 12px 0 42px; }
    .grid { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 18px; align-items: start; }

    /* ========================= CARD ========================= */
    .card {
      display: block; background: rgba(255,255,255,0.9);
      border-radius: 26px; overflow: hidden;
      text-decoration: none; color: inherit;
      box-shadow: 0 12px 34px rgba(31,38,33,0.08);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .card:hover { transform: translateY(-4px); box-shadow: 0 18px 36px rgba(31,38,33,0.12); }
    .card.hidden { display: none; }

    .card__media { position: relative; aspect-ratio: 4/4.2; overflow: hidden; background: #edf1ea; }
    .card__media img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.4s ease; }
    .card:hover .card__media img { transform: scale(1.05); }

    .card__media-placeholder {
      display: none; position: absolute; inset: 0;
      flex-direction: column; align-items: center; justify-content: center;
      background: linear-gradient(135deg, #e8f0e5 0%, #d4e4d0 100%);
      color: #7a9b83; gap: 10px;
    }
    .card__media-placeholder svg { width: 48px; height: 48px; stroke: #7a9b83; stroke-width: 1.2; fill: none; stroke-linecap: round; stroke-linejoin: round; opacity: 0.7; }
    .card__media-placeholder span { font-size: 13px; color: #8aab91; }

    .badge {
      position: absolute; top: 12px; left: 12px;
      padding: 7px 11px; border-radius: 999px;
      font-size: 12px; font-weight: 600;
      background: rgba(255,255,255,0.88);
      backdrop-filter: blur(10px);
      box-shadow: 0 6px 14px rgba(31,38,33,0.06);
    }
    .badge--new { color: #3f5d4a; }
    .badge--risky { color: #a05c2a; background: rgba(255,240,220,0.92); }
    .badge--size {
      position: absolute; top: 12px; right: 12px;
      padding: 6px 10px; border-radius: 999px;
      font-size: 12px; font-weight: 700;
      background: rgba(255,255,255,0.88);
      backdrop-filter: blur(10px); color: #506055;
    }

    .card__body { padding: 16px; }
    .card__kicker { font-size: 11px; color: #7e8c82; text-transform: uppercase; letter-spacing: 0.08em; }
    .card__title { font-size: 22px; line-height: 1.15; font-weight: 700; margin: 6px 0 0; color: #223128; }
    .card__latin { font-size: 14px; color: #728077; margin-top: 4px; font-style: italic; }
    .card__primorye { font-size: 12px; margin-top: 8px; padding: 6px 10px; border-radius: 10px; background: #f0f7ed; color: #4a7057; line-height: 1.4; }
    .card__primorye--risky { background: #fef3e8; color: #a05c2a; }

    .card__criteria { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 14px; }
    .icon-badge {
      width: 34px; height: 34px; border-radius: 999px;
      background: #eef2eb; border: 1px solid #e5ebe3;
      display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .icon-badge svg { width: 17px; height: 17px; stroke: #4d6a58; stroke-width: 1.8; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    .icon-badge--zone3 { background: #e8f3ff; border-color: #c8dff7; }
    .icon-badge--zone3 svg { stroke: #2c6aad; }
    .icon-badge--risky { background: #fff0e0; border-color: #f5d5a8; }
    .icon-badge--risky svg { stroke: #b06020; }

    .card__row { display: flex; justify-content: flex-end; margin-top: 14px; }
    .card__link {
      display: inline-flex; align-items: center; justify-content: center;
      padding: 9px 16px; border-radius: 999px;
      background: var(--green-soft-2); color: #3f5d4a;
      font-weight: 700; font-size: 13px;
    }

    /* ========================= MOBILE ========================= */
    @media (max-width: 1100px) {
      .header-inner { flex-wrap: wrap; padding: 16px 24px; gap: 16px; }
      .header-nav { order: 3; width: 100%; justify-content: center; padding-top: 8px; border-top: 1px solid var(--cream-faint); }
      .grid { grid-template-columns: repeat(2, minmax(0,1fr)); }
    }
    @media (max-width: 760px) {
      .container { width: min(100% - 18px, 1320px); }
      .header-shell { width: min(100% - 18px, 1320px); margin-top: 10px; }
      .hero { padding: 22px 16px 18px; border-radius: 24px; }
      .hero-title { font-size: 44px; }
      .search-row { grid-template-columns: 1fr; }
      .grid { grid-template-columns: 1fr; }
    }
    @media (max-width: 600px) {
      .header-inner { flex-direction: column; align-items: center; text-align: center; padding: 20px; }
      .contact-info { align-items: center; }
      .header-contact { flex-direction: column; gap: 12px; }
      .header-nav { flex-wrap: wrap; justify-content: center; }
    }
  </style>
</head>

<main>

      <div class="hero">

const ICONS = {
  sun: `<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3.6"/><path d="M12 2.5v2.7M12 18.8v2.7M21.5 12h-2.7M5.2 12H2.5M18.7 5.3l-1.9 1.9M7.2 16.8l-1.9 1.9M18.7 18.7l-1.9-1.9M7.2 7.2 5.3 5.3"/></svg>`,
  partial: `<svg viewBox="0 0 24 24"><path d="M5 15.5a4 4 0 1 1 1.2-7.8A5.5 5.5 0 0 1 17 9.5h.5a3.5 3.5 0 1 1 0 7H5z"/><path d="M15.5 4.5v2.2M15.5 12.3v2.2M19.4 8.4h-2.2M13.8 8.4h-2.2M18.3 5.6l-1.5 1.5M14.2 11.2l-1.5 1.5M18.3 11.2l-1.5-1.5"/></svg>`,
  snow: `<svg viewBox="0 0 24 24"><path d="M12 2.5v19M12 2.5 9.7 5M12 2.5 14.3 5M12 21.5 9.7 19M12 21.5 14.3 19M4.2 7.5l15.6 9M4.2 7.5 7.3 7.2M4.2 7.5 4.9 10.4M19.8 16.5 16.7 16.8M19.8 16.5 19.1 13.6M19.8 7.5 4.2 16.5M19.8 7.5 19.1 10.4M19.8 7.5 16.7 7.2M4.2 16.5 4.9 13.6M4.2 16.5 7.3 16.8"/></svg>`,
  drop: `<svg viewBox="0 0 24 24"><path d="M12 3.5s-5.5 6.2-5.5 10a5.5 5.5 0 0 0 11 0c0-3.8-5.5-10-5.5-10z"/></svg>`,
  dropHigh: `<svg viewBox="0 0 24 24"><path d="M12 3.5s-5.5 6.2-5.5 10a5.5 5.5 0 0 0 11 0c0-3.8-5.5-10-5.5-10z"/><path d="M9 13h6M12 11v4"/></svg>`,
};

function getWinterLabel(zone) {
  if (zone <= 3) return 'Очень зимостойкая';
  if (zone === 4) return 'Зимостойкая';
  return 'Требует укрытия';
}

function humanizeText(text) {
  return String(text || '')
    .replace(/Зона 3\s*—\s*очень зимостойкая/gi, 'Очень зимостойкая')
    .replace(/Зона 5\s*—\s*требует укрытия/gi, 'Требует укрытия')
    .replace(/Зона 3/gi, 'Очень зимостойкая')
    .replace(/Зона 4/gi, 'Зимостойкая')
    .replace(/Зона 5/gi, 'Требует укрытия');
}

function getIcons(h) {
  const icons = [];
  if (h.light === 'sun_partial') {
    icons.push({ svg: ICONS.sun, title: 'Солнце', cls: '' });
    icons.push({ svg: ICONS.partial, title: 'Лёгкая полутень', cls: '' });
  } else {
    icons.push({ svg: ICONS.partial, title: 'Полутень', cls: '' });
  }
  const winterCls = h.winterHardiness <= 3 ? 'icon-badge--zone3' : (h.winterHardiness >= 5 ? 'icon-badge--risky' : '');
  icons.push({ svg: ICONS.snow, title: getWinterLabel(h.winterHardiness), cls: winterCls });
  icons.push((h.watering === 'high' || h.watering === 'moderate_high')
    ? { svg: ICONS.dropHigh, title: 'Обильный полив', cls: '' }
    : { svg: ICONS.drop, title: 'Умеренный полив', cls: '' });
  return icons;
}

function renderCards(data) {
  const grid = document.getElementById('card-grid');
  grid.innerHTML = data.map(h => {
    const icons = getIcons(h).map(i =>
      `<span class="icon-badge ${i.cls}" title="${i.title}">${i.svg}</span>`).join('');
    const badge = h.featured
      ? `<span class="badge badge--new">Рекомендуем</span>`
      : h.primorye === 'risky'
      ? `<span class="badge badge--risky">⚠ Укрытие зимой</span>`
      : '';
    const sizeLbl = { S:'S · мини', M:'M · средний', L:'L · крупный' }[h.size];
    const primCls = h.primorye === 'risky' ? 'card__primorye--risky' : '';
    return `
      <a class="card" href="${h.id}.html" data-type="${h.type}" data-size="${h.size}" data-name="${h.name} ${h.nameRu}">
        <div class="card__media">
          ${badge}
          <span class="badge--size">${sizeLbl}</span>
          <img src="imageshydrangea/${h.coverFile || h.id+'_1.png'}" alt="${h.name}"
            onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
          <div class="card__media-placeholder">
            <svg viewBox="0 0 24 24"><path d="M12 3c0 0-7 4.5-7 9.5a7 7 0 0 0 14 0C19 7.5 12 3 12 3z"/><path d="M8 14c1-2 2.5-3.5 4-4"/></svg>
            <span>Фото скоро</span>
          </div>
        </div>
        <div class="card__body">
          <div class="card__kicker">гортензия ${h.typeRu.toLowerCase()}</div>
          <h3 class="card__title">${h.nameRu}</h3>
          <div class="card__latin">${h.name}</div>
          <div class="card__primorye ${primCls}">${humanizeText(h.primoryeNote)}</div>
          <div class="card__criteria">${icons}</div>
          <div class="card__row">
            <span class="card__link">${h.primorye === 'risky' ? 'Подробнее' : 'Смотреть →'}</span>
          </div>
        </div>
      </a>`;
  }).join('');
}

let activeFilter = 'all';
function setFilter(el) {
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  activeFilter = el.dataset.filter;
  filterCards();
}
function filterCards() {
  const q = document.getElementById('search-input').value.toLowerCase();
  document.querySelectorAll('.card').forEach(card => {
    const matchFilter = activeFilter === 'all' || card.dataset.type === activeFilter || card.dataset.size === activeFilter;
    const matchSearch = !q || card.dataset.name.toLowerCase().includes(q);
    card.classList.toggle('hidden', !(matchFilter && matchSearch));
  });
}

renderCards(HYDRANGEAS);
</script>

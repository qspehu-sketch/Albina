<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Каталог гортензий</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#f5f5f2;
}

.app {
  max-width:420px;
  margin:auto;
  background:white;
  min-height:100vh;
}

/* ШАПКА */
.topbar {
  padding:12px;
  border-bottom:1px solid #eee;
  display:flex;
  justify-content:space-between;
}

.hidden { display:none; }

/* КАРТОЧКИ */
.grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  padding:12px;
}

.card {
  background:white;
  border-radius:16px;
  overflow:hidden;
  box-shadow:0 2px 6px rgba(0,0,0,0.05);
  cursor:pointer;
}

.card img {
  width:100%;
  height:120px;
  object-fit:cover;
}

.card-body {
  padding:10px;
}

.title {
  font-size:14px;
  font-weight:bold;
}

.sub {
  font-size:12px;
  color:#777;
}

/* ВНУТРЕННЯЯ */
.hero img {
  width:100%;
  height:260px;
  object-fit:cover;
}

.section {
  padding:12px;
}

.button {
  position:fixed;
  bottom:0;
  width:100%;
  max-width:420px;
  background:white;
  padding:10px;
  border-top:1px solid #eee;
}

.button button {
  width:100%;
  padding:14px;
  background:#355543;
  color:white;
  border:none;
  border-radius:10px;
}
</style>

<script>
function openCard() {
  document.getElementById("main").classList.add("hidden");
  document.getElementById("detail").classList.remove("hidden");
}

function goBack() {
  document.getElementById("main").classList.remove("hidden");
  document.getElementById("detail").classList.add("hidden");
}
</script>

</head>

<body>

<div class="app">

<!-- ГЛАВНАЯ -->
<div id="main">

<div class="topbar">
  <div>
    <b>Мои 12 соток</b><br>
    @primsad
  </div>
  <div>
    Альбина<br>
    <b>+7 964 446 20 81</b>
  </div>
</div>

<div class="grid">

<!-- ЛАЙМЛАЙТ -->
<div class="card" onclick="openCard()">
  <img src="photo-1.jpg">
  <div class="card-body">
    <div class="title">Гортензия Лаймлайт</div>
    <div class="sub">Limelight</div>
  </div>
</div>

<!-- ЗАГЛУШКИ -->
<div class="card">
  <img src="https://picsum.photos/200/200">
  <div class="card-body">
    <div class="title">Bobo</div>
    <div class="sub">Скоро</div>
  </div>
</div>

<div class="card">
  <img src="https://picsum.photos/201/200">
  <div class="card-body">
    <div class="title">Vanilla Fraise</div>
    <div class="sub">Скоро</div>
  </div>
</div>

</div>
</div>

<!-- СТРАНИЦА СОРТА -->
<div id="detail" class="hidden">

<div class="topbar">
  <div onclick="goBack()">← Назад</div>
</div>

<div class="hero">
  <img src="photo-1.jpg">
</div>

<div class="section">
  <h2>Гортензия Лаймлайт</h2>
  <p>Limelight</p>
  <p>Светлая лаймовая гортензия</p>
</div>

<div class="section">
  <h3>Куст</h3>
  <img src="photo-2.jpg">
</div>

<div class="section">
  <h3>Цветок</h3>
  <img src="photo-3.jpg">
</div>

</div>

</div>

<div class="button">
<button>Написать продавцу</button>
</div>

</body>
</html>

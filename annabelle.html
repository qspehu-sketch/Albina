<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Сорт гортензии — Мои 12 соток</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Serif+Display&family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f3f2ee;
      --text: #223128;
      --muted: #6f7d73;
      --line: #e4e6df;
      --green-soft: #4b7d61;
      --green-soft-2: #dfe9dd;
      --chip: #edf1ea;
      --gold: #c8a96e;
      --gold-light: #ddc99a;
      --gold-muted: rgba(200, 169, 110, 0.25);
      --cream: #f5f0e8;
      --cream-dim: rgba(245, 240, 232, 0.5);
      --cream-faint: rgba(245, 240, 232, 0.1);
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: "Manrope", sans-serif; background: var(--bg); color: var(--text); }
    img { display: block; max-width: 100%; }
    .container { width: min(900px, calc(100% - 36px)); margin: 0 auto; }

    /* HEADER */
    .header-shell {
      width: min(1320px, calc(100% - 36px));
      margin: 18px auto 0;
    }
    .site-header {
      width: 100%;
      position: sticky;
      top: 10px;
      z-index: 100;
      overflow: hidden;
      border-radius: 16px;
      background: linear-gradient(120deg, #071007 0%, #0d1b0d 14%, #153015 34%, #1f4720 52%, #173717 68%, #0d1e0d 84%, #061006 100%);
      box-shadow: 0 6px 32px rgba(0,0,0,0.2), 0 1px 4px rgba(0,0,0,0.12), inset 0 1px 0 rgba(255,255,255,0.03);
    }
    .header-bg { position: absolute; inset: 0; overflow: hidden; pointer-events: none; }
    .header-bg::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 50% 160% at 5% 50%, rgba(60, 95, 55, 0.5), transparent 60%),
        radial-gradient(ellipse 40% 140% at 95% 40%, rgba(50, 80, 45, 0.35), transparent 55%),
        radial-gradient(ellipse 90% 60% at 50% 110%, rgba(15, 28, 15, 0.6), transparent 50%),
        radial-gradient(circle at 45% 30%, rgba(200, 169, 110, 0.04) 0%, transparent 45%);
    }
    .header-bg .leaf { position: absolute; opacity: 0.03; fill: var(--cream); }
    .leaf-1 { width: 320px; height: 320px; top: -90px; left: -50px; transform: rotate(-25deg); }
    .leaf-2 { width: 220px; height: 220px; top: -40px; right: 100px; transform: rotate(40deg); }
    .leaf-3 { width: 270px; height: 270px; bottom: -110px; right: -40px; transform: rotate(15deg); }
    .header-gold-line {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent 0%, var(--gold-muted) 15%, var(--gold) 50%, var(--gold-muted) 85%, transparent 100%);
    }
    .header-inner {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 22px 44px;
      gap: 32px;
    }
    .header-logo { flex-shrink: 0; }
    .logo-link {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
    }
    .logo-icon {
      width: 48px;
      height: 48px;
      flex-shrink: 0;
    }
    .logo-text {
      display: flex;
      flex-direction: column;
      line-height: 1;
    }
    .logo-main {
      font-family: "Cormorant Garamond", serif;
      font-weight: 600;
      font-size: 28px;
      color: var(--cream);
      letter-spacing: 0.02em;
      white-space: nowrap;
    }
    .logo-main em { font-style: italic; font-weight: 400; color: var(--gold-light); }
    .header-nav {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }
    .nav-divider-dot { width: 3px; height: 3px; border-radius: 50%; background: var(--cream-faint); flex-shrink: 0; }
    .nav-link {
      font-family: "Manrope", sans-serif;
      font-weight: 400;
      font-size: 13px;
      letter-spacing: 0.06em;
      text-transform: lowercase;
      color: var(--cream-dim);
      text-decoration: none;
      padding: 6px 14px;
      border-radius: 100px;
      transition: all 0.3s ease;
      white-space: nowrap;
      cursor: default;
    }
    .nav-link:hover { color: var(--cream-dim); background: transparent; }
    .header-contact { display: flex; align-items: center; gap: 20px; flex-shrink: 0; }
    .contact-info { display: flex; flex-direction: column; align-items: flex-end; gap: 2px; }
    .contact-name {
      font-family: "Cormorant Garamond", serif;
      font-weight: 400;
      font-style: italic;
      font-size: 14px;
      color: var(--gold-light);
      letter-spacing: 0.04em;
    }
    .contact-phone {
      font-family: "Manrope", sans-serif;
      font-weight: 500;
      font-size: 16px;
      color: var(--cream);
      letter-spacing: 0.05em;
      text-decoration: none;
      white-space: nowrap;
      transition: color 0.3s ease;
    }
    .contact-phone:hover { color: var(--gold-light); }
    .insta-link {
      display: flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      padding: 8px 16px;
      border-radius: 100px;
      border: 1px solid var(--cream-faint);
      transition: all 0.3s ease;
      flex-shrink: 0;
    }
    .insta-link:hover { border-color: var(--gold-muted); background: var(--cream-faint); }
    .insta-icon { width: 18px; height: 18px; color: var(--gold); flex-shrink: 0; }
    .insta-text {
      font-family: "Manrope", sans-serif;
      font-weight: 400;
      font-size: 13px;
      color: var(--cream-dim);
      letter-spacing: 0.02em;
    }

    /* BACK */
    .back-wrap { padding: 20px 0 0; }
    .back-link { display: inline-flex; align-items: center; gap: 6px; color: var(--muted); font-size: 14px; font-weight: 600; text-decoration: none; }
    .back-link:hover { color: var(--green-soft); }

    /* HERO SECTION */
    .sort-hero { padding: 20px 0 0; }
    .sort-hero-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 28px; align-items: start; }

    /* GALLERY */
    .gallery { display: flex; flex-direction: column; gap: 10px; }
    .gallery-main { border-radius: 22px; overflow: hidden; aspect-ratio: 4/3.6; background: #dfe9dd; }
    .gallery-main img { width: 100%; height: 100%; object-fit: cover; }
    .gallery-thumbs { display: flex; gap: 8px; }
    .gallery-thumb { flex: 1; border-radius: 12px; overflow: hidden; aspect-ratio: 1; cursor: pointer; opacity: 0.7; transition: opacity 0.2s; }
    .gallery-thumb:hover, .gallery-thumb.active { opacity: 1; }
    .gallery-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .gallery-placeholder {
      width: 100%; height: 100%;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: linear-gradient(135deg, #e8f0e5, #d4e4d0);
      color: #8aab91; gap: 8px; font-size: 13px;
    }
    .gallery-placeholder svg { width: 40px; height: 40px; stroke: #8aab91; stroke-width: 1.2; fill: none; stroke-linecap: round; stroke-linejoin: round; }

    /* INFO PANEL */
    .info-panel { display: flex; flex-direction: column; gap: 0; }
    .sort-kicker { font-size: 12px; color: #7e8c82; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; }
    .sort-title { font-family: "DM Serif Display", serif; font-size: clamp(32px,4vw,52px); line-height: 1; font-weight: 400; color: #213127; letter-spacing: -0.02em; margin: 0 0 4px; }
    .sort-latin { font-size: 15px; color: #7e8c82; font-style: normal; margin-bottom: 20px; }

    /* Иконки-параметры */
    .params-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
    .param-card {
      background: #fff;
      border-radius: 16px;
      padding: 12px 14px;
      border: 1px solid var(--line);
    }
    .param-card__label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 6px; display: flex; align-items: center; gap: 6px; }
    .param-card__label svg { width: 14px; height: 14px; stroke: var(--muted); stroke-width: 1.8; fill: none; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }
    .param-card__icons { display: inline-flex; align-items: center; gap: 4px; }
    .param-card__icons svg { width: 14px; height: 14px; stroke: var(--muted); stroke-width: 1.8; fill: none; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }
    .param-card__value { font-size: 15px; font-weight: 700; color: var(--text); }
    .param-card__sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .param-card--primorye { grid-column: 1 / -1; background: #f0f7ed; border-color: #c8e0c4; }
    .param-card--risky { background: #fef3e8; border-color: #f5d5a8; }

    /* Цвета по сезону */
    .color-stages { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
    .color-stage { display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .color-dot { width: 32px; height: 32px; border-radius: 50%; border: 2px solid rgba(0,0,0,0.08); }
    .color-stage-label { font-size: 10px; color: var(--muted); text-align: center; max-width: 50px; }

    /* CTA */
    .cta-block { background: linear-gradient(135deg, #123726, #21513a); border-radius: 20px; padding: 20px; color: #fff; }
    .cta-block h4 { margin: 0 0 8px; font-size: 17px; font-weight: 800; }
    .cta-block p { margin: 0 0 14px; font-size: 14px; opacity: 0.8; line-height: 1.5; }
    .cta-phone { display: block; font-size: 22px; font-weight: 800; color: #fff; text-decoration: none; letter-spacing: -0.03em; margin-bottom: 10px; }
    .cta-insta { display: inline-flex; align-items: center; gap: 7px; background: rgba(255,255,255,0.15); padding: 8px 14px; border-radius: 999px; color: #fff; text-decoration: none; font-weight: 700; font-size: 13px; }

    /* DETAILS */
    .details-section { padding: 32px 0 48px; }
    .details-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 22px; }
    .detail-block {
      background: #fff;
      border-radius: 20px;
      padding: 22px;
      border: 1px solid var(--line);
    }
    .detail-block--full { grid-column: 1 / -1; }
    .detail-block h3 { margin: 0 0 14px; font-size: 14px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); }
    .detail-block p { margin: 0; font-size: 15px; line-height: 1.65; color: var(--text); }
    .detail-block > .description-text { margin: 0; font-size: 15px; line-height: 1.8; color: var(--text); }
    .multiline-text { display: block; line-height: 1.7; }
    .detail-block ul.features-list { list-style: none; padding: 0; margin: 0; }
    .detail-block ul.features-list li {
      position: relative;
      padding-left: 1.35em;
      margin-bottom: 8px;
      font-size: 15px;
      line-height: 1.7;
      color: var(--text);
    }
    .detail-block ul.features-list li::before {
      content: "✓";
      position: absolute;
      left: 0;
      color: #4b7d61;
      font-weight: 700;
    }

    .bloom-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .bloom-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
    .bloom-text { font-size: 14px; }

    .tag-list { display: flex; flex-wrap: wrap; gap: 8px; }
    .tag { padding: 7px 13px; border-radius: 999px; background: var(--chip); color: #506055; font-size: 13px; font-weight: 600; }

    .name-meaning { font-style: italic; color: var(--muted); font-size: 15px; line-height: 1.6; }

    /* MOBILE */
    @media (max-width: 1100px) {
      .header-inner { flex-wrap: wrap; padding: 16px 24px; gap: 16px; }
      .header-nav { order: 3; width: 100%; justify-content: center; padding-top: 8px; border-top: 1px solid var(--cream-faint); }
    }
    @media (max-width: 700px) {
      .header-shell { width: min(100% - 18px, 1320px); margin-top: 10px; }
      .header-inner { flex-direction: column; align-items: center; text-align: center; padding: 20px; }
      .contact-info { align-items: center; }
      .header-contact { flex-direction: column; gap: 12px; }
      .header-nav { flex-wrap: wrap; justify-content: center; }
      .sort-hero-grid { grid-template-columns: 1fr; }
      .details-grid { grid-template-columns: 1fr; }
      .detail-block--full { grid-column: 1; }
      .params-grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>

function getSortHeaderNames(id, h) {
  return SORT_HEADER_NAMES[id] || { ru: h.name, en: h.latinName };
}

// ============================================================
//  ОПРЕДЕЛЯЕМ КАКОЙ СОРТ ОТКРЫТ
// ============================================================
function getSortId() {
  // Из имени файла: limelight.html → limelight
  const path = window.location.pathname;
  const file = path.split('/').pop().replace('.html', '');
  return file;
}


// ============================================================
//  ФОРМАТИРОВАНИЕ ТЕКСТОВ
// ============================================================
function escapeHtml(s) {
  return String(s)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

function normalizeWinterHardiness(text) {
  const value = String(text || "");
  if (value.includes("Зона 3")) return "Очень зимостойкая";
  if (value.includes("Зона 4")) return "Зимостойкая";
  if (value.includes("Зона 5")) return "Требует укрытия";
  return value;
}

function humanizeText(text) {
  return String(text || "")
    .replace(/Зона 3\s*—\s*очень зимостойкая/gi, "Очень зимостойкая")
    .replace(/Зона 5\s*—\s*требует укрытия/gi, "Требует укрытия")
    .replace(/Зона 3/gi, "Очень зимостойкая")
    .replace(/Зона 4/gi, "Зимостойкая")
    .replace(/Зона 5/gi, "Требует укрытия");
}

function normalizeLightText(text) {
  return String(text || "").replace("Солнце / полутень", "Солнце / лёгкая полутень");
}

function snowflakeIcon() {
  return `<svg viewBox="0 0 24 24"><path d="M12 2.5v19M12 2.5 9.7 5M12 2.5 14.3 5M12 21.5 9.7 19M12 21.5 14.3 19M4.2 7.5l15.6 9M4.2 7.5 7.3 7.2M4.2 7.5 4.9 10.4M19.8 16.5 16.7 16.8M19.8 16.5 19.1 13.6M19.8 7.5 4.2 16.5M19.8 7.5 19.1 10.4M19.8 7.5 16.7 7.2M4.2 16.5 4.9 13.6M4.2 16.5 7.3 16.8"/></svg>`;
}

function sunIcon() {
  return `<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3.6"/><path d="M12 2.5v2.7M12 18.8v2.7M21.5 12h-2.7M5.2 12H2.5M18.7 5.3l-1.9 1.9M18.7 18.7l-1.9-1.9M7.2 7.2 5.3 5.3M7.2 16.8l-1.9 1.9"/></svg>`;
}

function partialIcon() {
  return `<svg viewBox="0 0 24 24"><path d="M5 15.5a4 4 0 1 1 1.2-7.8A5.5 5.5 0 0 1 17 9.5h.5a3.5 3.5 0 1 1 0 7H5z"/><path d="M15.5 4.5v2.2M15.5 12.3v2.2M19.4 8.4h-2.2M13.8 8.4h-2.2M18.3 5.6l-1.5 1.5M14.2 11.2l-1.5 1.5M18.3 11.2l-1.5-1.5"/></svg>`;
}

function lightIconsHtml(text) {
  const value = normalizeLightText(text);
  if (value.includes("/")) return `<span class="param-card__icons">${sunIcon()}${partialIcon()}</span>`;
  return `<span class="param-card__icons">${partialIcon()}</span>`;
}

function formatMultilineTextHtml(text, className = "multiline-text") {
  const lines = humanizeText(text)
    .split(/\n+/)
    .map((line) => line.trim())
    .filter(Boolean)
    .map((line) => line.replace(/[.!?]+$/g, ""));
  return `<span class="${className}">${lines.map(escapeHtml).join("<br>")}</span>`;
}

function formatDescriptionHtml(text) {
  const lines = humanizeText(text)
    .split(/(?<=[.!?])\s+/)
    .map((line) => line.trim())
    .filter(Boolean)
    .map((line) => line.replace(/[.!?]+$/g, ""));
  return `<p class="description-text">${lines.map(escapeHtml).join("<br>")}</p>`;
}

              </div>

function switchPhoto(src, thumb) {

}
